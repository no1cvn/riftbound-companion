<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="Unofficial fan companion for the Riftbound TCG." />

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0a0d1c" />

<!-- iOS -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Riftbound" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/icon-192.png" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/styles.css" />
<title>Riftbound Companion</title>
</head>
<body>

<div id="app">

  <!-- ── Page views ──────────────────────────────────────────── -->
  <div id="pages">
    <div class="page" id="page-home"></div>
    <div class="page" id="page-collection"></div>
    <div class="page" id="page-decks"></div>
    <div class="page" id="page-wishlist"></div>
  </div>

  <!-- ── Bottom tab bar ────────────────────────────────────────── -->
  <nav id="tabbar" aria-label="Navigation">

    <button class="tab-btn" data-tab="home" aria-label="Home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      <span>Home</span>
    </button>

    <button class="tab-btn" data-tab="collection" aria-label="Cards">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>Cards</span>
    </button>

    <!-- Center scan FAB -->
    <button id="scan-fab" aria-label="Scan card">
      <div class="scan-fab-hex">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="5" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
          <rect x="3" y="16" width="7" height="5" rx="1"/><rect x="14" y="16" width="7" height="5" rx="1"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </div>
    </button>

    <button class="tab-btn" data-tab="decks" aria-label="Decks">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span>Decks</span>
    </button>

    <button class="tab-btn" data-tab="wishlist" aria-label="Wishlist">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Wishlist</span>
    </button>

  </nav>

  <!-- ── Scanner overlay ───────────────────────────────────────── -->
  <div id="overlay-scan" class="overlay" hidden>

    <!-- Live camera -->
    <div class="scan-video-wrap">
      <video id="scan-video" playsinline muted autoplay></video>
      <div class="scan-dim"></div>
    </div>

    <!-- Guide frame -->
    <div class="scan-guide-clip">
      <div class="scan-guide">
        <div class="sc tl"></div>
        <div class="sc tr"></div>
        <div class="sc bl"></div>
        <div class="sc br"></div>
        <div class="scan-line"></div>
        <div class="scan-guide-placeholder">OGN 000 / 298</div>
      </div>
    </div>

    <!-- Top bar -->
    <div class="scan-topbar">
      <button class="round-btn" id="scan-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <span class="scan-topbar-title" id="scan-title">Scan card number</span>
      <button class="round-btn" id="scan-flash" aria-label="Flash" style="color:var(--muted)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </button>
    </div>

    <!-- Bottom control area — content swapped by phase -->
    <div class="scan-bottom" id="scan-bottom"></div>

  </div>

  <!-- ── Card detail overlay ───────────────────────────────────── -->
  <div id="overlay-card" class="overlay" hidden></div>

  <!-- ── Toast ─────────────────────────────────────────────────── -->
  <div id="toast" hidden role="status" aria-live="polite"></div>

</div><!-- #app -->

<script type="module" src="js/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
