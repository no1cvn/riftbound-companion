<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Riftbound Companion</title>
<meta name="description" content="Unofficial fan companion for the Riftbound TCG: scan collector numbers, track your collection, build decks." />

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0a0d1c" />

<!-- iOS "Add to Home Screen" -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Riftbound" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<link rel="icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="css/styles.css" />

<!-- Space Grotesk, with a fast system fallback already defined in styles.css -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div id="app" class="app-shell">

  <header class="app-header">
    <div class="brand">
      <span class="hexgate-mark" aria-hidden="true"></span>
      <span class="brand-name">Riftbound Companion</span>
    </div>
  </header>

  <main id="view-root" class="view-root" aria-live="polite">
    <!-- views rendered by js/app.js -->
    <p class="loading-text">Loading…</p>
  </main>

  <nav class="tab-bar" aria-label="Main navigation">
    <button class="tab-btn" data-route="scan" aria-current="page">
      <span class="tab-icon" aria-hidden="true">◈</span>
      <span class="tab-label">Scan</span>
    </button>
    <button class="tab-btn" data-route="collection">
      <span class="tab-icon" aria-hidden="true">▥</span>
      <span class="tab-label">Collection</span>
    </button>
    <button class="tab-btn" data-route="decks">
      <span class="tab-icon" aria-hidden="true">⬡</span>
      <span class="tab-label">Decks</span>
    </button>
    <button class="tab-btn" data-route="wishlist">
      <span class="tab-icon" aria-hidden="true">☆</span>
      <span class="tab-label">Wishlist</span>
    </button>
    <button class="tab-btn" data-route="about">
      <span class="tab-icon" aria-hidden="true">ⓘ</span>
      <span class="tab-label">About</span>
    </button>
  </nav>

</div>

<script type="module" src="js/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {
        /* offline shell is a nice-to-have, never block the app on it */
      });
    });
  }
</script>
</body>
</html>
